services:
  # Neo4j Database
  neo4j:
    image: neo4j:5.15.0
    container_name: advisor_neo4j
    restart: always
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - advisor-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build: .
    container_name: advisor_backend
    depends_on:
      neo4j:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override Neo4j URI to point to the container name
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    volumes:
      # Mount source code for hot reloading (optional, remove in prod)
      - ./advisor_ai:/app/advisor_ai
      - ./chroma_db:/app/chroma_db
      - ./important_pdf:/app/important_pdf
    networks:
      - advisor-network
    command: uvicorn advisor_ai.main:app --host 0.0.0.0 --port 8000 --reload

  # Streamlit Frontend
  frontend:
    build: .
    container_name: advisor_frontend
    depends_on:
      - backend
    ports:
      - "8501:8501"
    environment:
      # Point frontend to backend container
      - API_URL=http://backend:8000
    volumes:
      - ./advisor_ai:/app/advisor_ai
    networks:
      - advisor-network
    command: streamlit run advisor_ai/streamlit_app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  neo4j_data:
  neo4j_logs:

networks:
  advisor-network:
    driver: bridge
